apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xpushare-scheduler
  namespace: xpushare-system
spec:
  selector:
    matchLabels:
      name: xpushare-scheduler
  template:
    metadata:
      labels:
        name: xpushare-scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9402"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: xpushare-scheduler
      priorityClassName: system-node-critical
      hostPID: true
      containers:
      - name: xpushare-scheduler
        image: registry.cn-hangzhou.aliyuncs.com/xpushare/xpushare-scheduler:af887248
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 9402
          name: metrics
          protocol: TCP
        volumeMounts:
          - name: xpushare-socket-directory
            mountPath: /var/run/xpushare
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "utility"
        - name: XPUSHARE_DEBUG
          value: "1"
        - name: XPUSHARE_METRICS_ENABLE
          value: "1"
        - name: XPUSHARE_COMPUTE_WINDOW_MS
          value: "4000"
        - name: XPUSHARE_QUOTA_CARRYOVER_PERCENT
          value: "0"
        - name: XPUSHARE_INIT_PREEMPT_ENABLE
          value: "1"
        - name: XPUSHARE_INIT_PREEMPT_TIMEOUT_MS
          value: "8000"
        - name: XPUSHARE_QUOTA_SAMPLE_INTERVAL_MS
          value: "20"
        - name: XPUSHARE_DROP_TAIL_BILLING_PERCENT
          value: "70"
        - name: XPUSHARE_MEM_WM_HIGH_PERCENT
          value: "95"
        - name: XPUSHARE_MEM_WM_LOW_PERCENT
          value: "90"
      volumes:
        - name: xpushare-socket-directory
          hostPath:
            path: /var/run/xpushare
            type: DirectoryOrCreate
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
