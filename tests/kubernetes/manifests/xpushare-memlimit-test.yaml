# Test manifest for GPU memory limit feature
# This pod requests 4GiB GPU memory limit
apiVersion: v1
kind: Pod 
metadata:
  name: xpushare-memlimit-test
spec:
  restartPolicy: OnFailure
  containers:
  - image: registry.cn-hangzhou.aliyuncs.com/lgytest1/xpushare:pytorch-add-small-5fed3e5b
    env:
    - name: XPUSHARE_DEBUG
      value: "1"
    - name: XPUSHARE_GPU_MEMORY_LIMIT
      value: "4Gi"  # Limit GPU memory to 4GiB
    name: xpushare-memlimit-test-ctr
    resources:
      limits:
        xpushare.com/gpu: 1
