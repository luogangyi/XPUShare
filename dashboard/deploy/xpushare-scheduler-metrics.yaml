apiVersion: v1
kind: Service
metadata:
  name: xpushare-scheduler-metrics
  namespace: xpushare-system
  labels:
    app: xpushare-scheduler-metrics
spec:
  selector:
    name: xpushare-scheduler
  ports:
    - name: metrics
      port: 9402
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: xpushare-scheduler
  namespace: xpushare-system
  labels:
    app: xpushare-scheduler
spec:
  namespaceSelector:
    matchNames:
      - xpushare-system
  selector:
    matchLabels:
      app: xpushare-scheduler-metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
